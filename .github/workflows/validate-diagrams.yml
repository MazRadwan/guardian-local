name: Validate Architecture Diagrams

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      update_mode:
        description: 'How to handle diagram drift'
        required: true
        default: 'report'
        type: choice
        options:
          - report        # Just report drift, don't change anything
          - auto-update   # Auto-update for minor drift, PR for major
          - pr-only       # Always create PR, never auto-commit

  # Optional: trigger on push to main (architecture-relevant paths only)
  # Uncomment to enable automatic validation on merge
  # push:
  #   branches: [main]
  #   paths:
  #     - 'apps/web/src/**/*.ts'
  #     - 'apps/web/src/**/*.tsx'
  #     - 'packages/backend/src/**/*.ts'
  #     - '!**/*.test.ts'
  #     - '!**/__tests__/**'

jobs:
  validate:
    name: Validate Diagram Mappings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit comparison

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get last validated commit
        id: last-commit
        run: |
          LAST_COMMIT=$(grep 'last_processed_commit' docs/design/architecture/diagram-index.yaml | cut -d'"' -f2)
          echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT
          echo "Last validated commit: $LAST_COMMIT"

      - name: Check for architecture-relevant changes
        id: changes
        run: |
          LAST_COMMIT="${{ steps.last-commit.outputs.last_commit }}"

          # Get commits since last validation, filtering to relevant paths
          CHANGES=$(git log ${LAST_COMMIT}..HEAD --oneline -- \
            'apps/web/src/**/*.ts' \
            'apps/web/src/**/*.tsx' \
            'packages/backend/src/**/*.ts' \
            ':!**/*.test.ts' \
            ':!**/__tests__/**' \
            ':!tasks/**' \
            ':!.claude/**' \
            ':!docs/**' \
            2>/dev/null || echo "")

          if [ -z "$CHANGES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No architecture-relevant changes since last validation"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            COMMIT_COUNT=$(echo "$CHANGES" | wc -l | tr -d ' ')
            echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
            echo "Found $COMMIT_COUNT architecture-relevant commits"
            echo "$CHANGES"
          fi

      - name: Validate diagram nodes exist
        if: steps.changes.outputs.has_changes == 'true'
        id: validate
        run: |
          echo "## Diagram Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commits analyzed:** ${{ steps.changes.outputs.commit_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          MISSING=0
          FOUND=0

          # Extract node paths from mapping file and validate
          echo "### Node Validation" >> $GITHUB_STEP_SUMMARY
          echo "| Node | Status | Path |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|------|" >> $GITHUB_STEP_SUMMARY

          # Check key files exist (simplified validation)
          declare -A NODES=(
            ["ChatInterface"]="apps/web/src/components/chat/ChatInterface.tsx"
            ["useChatController"]="apps/web/src/hooks/useChatController.ts"
            ["chatStore"]="apps/web/src/stores/chatStore.ts"
            ["ChatServer"]="packages/backend/src/infrastructure/websocket/ChatServer.ts"
            ["AuthService"]="packages/backend/src/application/services/AuthService.ts"
            ["ConversationService"]="packages/backend/src/application/services/ConversationService.ts"
            ["ClaudeClient"]="packages/backend/src/infrastructure/ai/ClaudeClient.ts"
            ["User"]="packages/backend/src/domain/entities/User.ts"
          )

          for NODE in "${!NODES[@]}"; do
            PATH="${NODES[$NODE]}"
            if [ -f "$PATH" ]; then
              echo "| $NODE | ✅ | $PATH |" >> $GITHUB_STEP_SUMMARY
              ((FOUND++))
            else
              echo "| $NODE | ❌ | $PATH |" >> $GITHUB_STEP_SUMMARY
              ((MISSING++))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Summary:** $FOUND found, $MISSING missing" >> $GITHUB_STEP_SUMMARY

          echo "missing_count=$MISSING" >> $GITHUB_OUTPUT
          echo "found_count=$FOUND" >> $GITHUB_OUTPUT

          if [ $MISSING -gt 0 ]; then
            echo "status=drift" >> $GITHUB_OUTPUT
          else
            echo "status=valid" >> $GITHUB_OUTPUT
          fi

      - name: Check for new significant files
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### New Files (potential diagram additions)" >> $GITHUB_STEP_SUMMARY

          LAST_COMMIT="${{ steps.last-commit.outputs.last_commit }}"

          # Find new service files
          NEW_SERVICES=$(git diff --name-only --diff-filter=A ${LAST_COMMIT}..HEAD -- \
            'packages/backend/src/application/services/*.ts' 2>/dev/null || echo "")

          if [ -n "$NEW_SERVICES" ]; then
            echo "**New Services:**" >> $GITHUB_STEP_SUMMARY
            echo "$NEW_SERVICES" | while read f; do echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY; done
          fi

          # Find new hooks
          NEW_HOOKS=$(git diff --name-only --diff-filter=A ${LAST_COMMIT}..HEAD -- \
            'apps/web/src/hooks/*.ts' 2>/dev/null || echo "")

          if [ -n "$NEW_HOOKS" ]; then
            echo "**New Hooks:**" >> $GITHUB_STEP_SUMMARY
            echo "$NEW_HOOKS" | while read f; do echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY; done
          fi

          # Find new components
          NEW_COMPONENTS=$(git diff --name-only --diff-filter=A ${LAST_COMMIT}..HEAD -- \
            'apps/web/src/components/**/*.tsx' 2>/dev/null || echo "")

          if [ -n "$NEW_COMPONENTS" ]; then
            echo "**New Components:**" >> $GITHUB_STEP_SUMMARY
            echo "$NEW_COMPONENTS" | while read f; do echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY; done
          fi

      - name: Update index commit hash
        if: steps.changes.outputs.has_changes == 'true' && github.event.inputs.update_mode != 'report'
        run: |
          CURRENT_COMMIT=$(git rev-parse HEAD)
          TODAY=$(date +%Y-%m-%d)

          sed -i "s/last_processed_commit: .*/last_processed_commit: \"$CURRENT_COMMIT\"/" docs/design/architecture/diagram-index.yaml
          sed -i "s/last_updated: .*/last_updated: \"$TODAY\"/" docs/design/architecture/diagram-index.yaml

          echo "Updated diagram-index.yaml with commit $CURRENT_COMMIT"

      - name: Create PR for diagram updates
        if: steps.changes.outputs.has_changes == 'true' && steps.validate.outputs.status == 'drift' && github.event.inputs.update_mode == 'pr-only'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update architecture diagram validation"
          title: "docs: Architecture diagram drift detected"
          body: |
            ## Diagram Validation Results

            Architecture changes were detected that may require diagram updates.

            **Status:** ${{ steps.validate.outputs.status }}
            **Missing nodes:** ${{ steps.validate.outputs.missing_count }}
            **Commits since last validation:** ${{ steps.changes.outputs.commit_count }}

            Please review the diagram and mapping files:
            - `docs/design/architecture/architecture-latest.mmd`
            - `docs/design/architecture/architecture-latest.mapping.yaml`
          branch: docs/diagram-validation-${{ github.run_number }}
          delete-branch: true

      - name: Report status
        if: always()
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "false" ]; then
            echo "✅ Diagrams are up to date - no architecture changes since last validation"
          elif [ "${{ steps.validate.outputs.status }}" == "valid" ]; then
            echo "✅ All diagram nodes validated successfully"
          else
            echo "⚠️ Diagram drift detected - ${{ steps.validate.outputs.missing_count }} nodes need attention"
            exit 1
          fi
