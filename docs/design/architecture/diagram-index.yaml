      Epic 31 update: Added async extraction infrastructure - BackgroundExtractor for
      fire-and-forget text extraction, decouples upload from extraction for parallel
      file upload performance.
      Epic 33 update: Added web search capability - WebSearchToolService handles web_search
      tool calls via Jina AI Search and Reader APIs. JinaClient wraps external API with
      retry logic. ToolUseRegistry dispatches to WebSearchToolService.
      Epic 34 update: Extracted ConsultToolLoopService from MessageHandler. Handles consult
      mode tool loop execution (max 3 iterations) with graceful degradation.
      Epic 35 update: Extracted TitleUpdateService for fire-and-forget title generation
      and scoring title updates.
      Epic 36 update: Decomposed MessageHandler into SendMessageOrchestrator (7-step pipeline),
      SendMessageValidator, ClaudeStreamingService, BackgroundEnrichmentService, and ModeRouter.
      Removed ModeStrategies subgraph (AssessmentModeStrategy, ConsultModeStrategy,
      ScoringModeStrategy) - dead code replaced by ModeRouter pure function.
      Added MessagePipeline subgraph containing the new send message services.
      ScoringHandler no longer uses StreamingHandler. StreamingHandler only used by
      QuestionnaireHandler. Added Jina API to External subgraph.
