    description: |
      Comprehensive flowchart showing Guardian's layered architecture:
      Presentation (Next.js/React) -> Hooks/State -> WebSocket -> Backend -> Services -> Domain -> Data
      Includes AI pipeline with Claude integration.
      Epic 28 update: Backend layer now shows modular ChatServer architecture with
      Handlers (Connection, Conversation, ModeSwitch, Questionnaire, Scoring)
      and Context Builders.
      Epic 30 update: Added Vision API support - VisionContentBuilder converts images to
      ImageContentBlock, FileContextBuilder.buildWithImages() returns FileContextResult with
