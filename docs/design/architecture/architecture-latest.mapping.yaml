# Architecture Diagram Mapping
# Maps diagram nodes to actual code paths for validation
# Used by diagram-updater-agent
#
# VALIDATED: 2026-01-26 - Paths verified against actual codebase
# UPDATED: 2026-01-26 - Added Epic 30 Vision API support (VisionContentBuilder, updated FileContextBuilder)

diagram: architecture-latest.mmd
last_verified: "2026-01-26"

# Subgraph to directory mappings
subgraphs:
  Presentation:
    paths:
      - "apps/web/src/components/**"
      - "apps/web/src/app/**"

  HooksState:
    paths:
      - "apps/web/src/hooks/**"
      - "apps/web/src/stores/**"
      - "apps/web/src/services/**"

  WebSocket:
    paths:
      - "apps/web/src/lib/websocket.ts"
      - "packages/backend/src/infrastructure/websocket/**"

  Backend:
    paths:
      - "packages/backend/src/infrastructure/http/**"
      - "packages/backend/src/infrastructure/websocket/**"

  Services:
    paths:
      - "packages/backend/src/application/services/**"

  Domain:
    paths:
      - "packages/backend/src/domain/**"

  AI:
    paths:
      - "packages/backend/src/infrastructure/ai/**"

  Data:
    paths:
      - "packages/backend/src/infrastructure/database/**"
      - "packages/backend/src/infrastructure/auth/**"
      - "packages/backend/src/infrastructure/export/**"

