# Architecture Diagram Mapping
# Maps diagram nodes to actual code paths for validation
# Used by diagram-updater-agent
#
# VALIDATED: 2026-03-10 - Paths verified against actual codebase
# UPDATED: 2026-03-10 - Auth hardening, local model support, search guardrails:
#   Added SearchGuardrails (topic scope + injection defense for WebSearchToolService),
#   Updated ServerEvents (scoring_started/progress/complete/error, vendor_clarification_needed),
#   Updated ClientEvents (vendor_selected), ScoringHandler disconnect resilience (nsp room emit),
#   AuthService TTL cleanup + token revocation, role middleware on write operations
# UPDATED: 2026-02-26 - Epic 37/38/39/40: ISO compliance domain + tables + repos,
#   ScoringService decomposition (ScoringLLMService, ScoringStorageService,
#   ScoringQueryService, ScoringRetryService, ScoringMetricsCollector),
#   ScoringPayloadReconciler, SubScoreValidator, CompositeScoreValidator,
#   subScoreRules, Rubric v1.1, ClaudeClient decomposition (Base/Stream/Text/Vision),
#   Extraction pipeline (ExtractionRoutingService, RegexResponseExtractor,
#   ExtractionConfidenceCalculator), ScoringPostProcessor, ScoringExcelExporter,
#   ISO tables (6), ISO repos (4), ISOControlRetrievalService
# UPDATED: 2026-02-09 - Epic 33/34/35/36: MessageHandler decomposition, web search, tool loop, title extraction

